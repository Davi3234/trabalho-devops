services:
  api-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    networks:
      - app-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    env_file: ./auth-service/.env
    depends_on:
      redis-auth:
        condition: service_healthy
    volumes:
      - ./auth-service:/var/www
      - /var/www/vendor
    networks:
      - app-network

  alerts:
    build:
      context: ./alerts
      dockerfile: Dockerfile
    environment:
      APP_KEY: ${ALERTS_APP_KEY}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_QUEUE: price.collected
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALERT_COOLDOWN_TTL: 3600
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis-alerts:
        condition: service_healthy
    volumes:
      - ./alerts:/var/www
      - /var/www/vendor
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis-auth:
    image: redis:7-alpine
    volumes:
      - redis_auth_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis-alerts:
    image: redis:7-alpine
    volumes:
      - redis_alerts_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  rabbitmq_data:
  redis_auth_data:
  redis_alerts_data:

networks:
  app-network:
    driver: bridge