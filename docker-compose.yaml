services:
  api-gateway:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-nginx
      - inventory-service
      - order-service
      - payment-nginx
    networks:
      - app-network

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      target: development
    env_file: ./auth-service/.env
    depends_on:
      db-auth:
        condition: service_healthy
    volumes:
      - ./auth-service:/var/www
      - /var/www/vendor
    networks:
      - app-network

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: ${POSTGRES_USER_AUTH}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_AUTH}
    volumes:
      - auth_data:/var/lib/postgresql/data
    ports:
      - 5436:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER_AUTH} -d auth" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  auth-nginx:
    image: nginx:alpine
    ports:
      - 5001:5001
    volumes:
      - ./auth-service:/var/www:ro
      - ./api-gateway/auth.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
    networks:
      - app-network

  order-service:
    build:
      context: ./order-service
    environment:
      DB_URL: jdbc:postgresql://db-order:5432/order
      DB_USERNAME: ${POSTGRES_USER_ORDER}
      DB_PASSWORD: ${POSTGRES_PASSWORD_ORDER}
    ports:
      - 8080:8080
    depends_on:
      db-order:
        condition: service_healthy
    networks:
      - app-network

  db-order:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: order
      POSTGRES_USER: ${POSTGRES_USER_ORDER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ORDER}
    ports:
      - 5433:5432
    volumes:
      - order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_ORDER} -d order"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  inventory-service:
    build: 
      context: ./inventory-service
    volumes:
      - ./inventory-service:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db-inventory
    ports:
      - 3000:3000
    networks:
      - app-network

  db-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: ${POSTGRES_USER_INVENTORY}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_INVENTORY}
    volumes:
      - inventory_data:/var/lib/postgresql/data
    ports:
      - 5434:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_INVENTORY} -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    env_file: ./payment-service/.env
    depends_on:
      db-payment:
        condition: service_healthy
    volumes:
      - ./payment-service:/var/www
      - /var/www/vendor
    networks:
      - app-network

  payment-nginx:
    image: nginx:alpine
    ports:
      - 5002:5002
    volumes:
      - ./payment-service:/var/www:ro
      - ./api-gateway/payment.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - payment-service
    networks:
      - app-network

  db-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment
      POSTGRES_USER: ${POSTGRES_USER_PAYMENT}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_PAYMENT}
    volumes:
      - payment_data:/var/lib/postgresql/data
    ports:
      - 5435:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_PAYMENT} -d payment"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  inventory-service.cache:
    image: redis:latest
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD_INVENTORY}
    ports:
      - 6379:6379
    command: >
      redis-server --requirepass ${REDIS_PASSWORD_INVENTORY}
    volumes:
      - redis_data:/data
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  inventory_data:
  order_data:
  payment_data:
  auth_data:
  redis_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge