events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        location = /auth/validate-token {
            internal;

            proxy_pass http://auth-nginx:5001/validate-token;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Authorization $http_authorization;
        }

        location /auth/ {
            proxy_pass http://auth-nginx:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /payments/ {
            auth_request /auth/validate-token;
            proxy_pass http://payment-nginx:5002/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /inventories/ {
            auth_request /auth/validate-token;
            proxy_pass http://inventory-service:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /orders/ {
            auth_request /auth/validate-token;
            proxy_pass http://order-service:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}