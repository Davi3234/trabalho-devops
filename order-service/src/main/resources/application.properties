spring.application.name=order-service

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/order}
spring.datasource.username=${DB_USERNAME:order}
spring.datasource.password=${DB_PASSWORD:order}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Filas consumidas pelo order-service
rabbitmq.queues.estoque-reserva-falhou=order.estoque.reserva_falhou
rabbitmq.queues.pagamento-recusado=order.pagamento.recusado
rabbitmq.queues.pagamento-confirmado=order.pagamento.confirmado
rabbitmq.queues.entrega-despachada=order.entrega.despachada

# Server
server.port=8080
