name: Payment Service — CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "payment-service/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "payment-service/**"
  workflow_dispatch:

env:
  SERVICE_DIR: payment-service
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/payment-service

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, bcmath, xml, pdo_mysql
          coverage: none

      - name: Get Composer Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
        working-directory: ${{ env.SERVICE_DIR }}

      - name: Run tests (JUnit)
        run: |
          mkdir -p ${{ env.SERVICE_DIR }}/build/test-reports
          ./vendor/bin/phpunit --configuration ${{ env.SERVICE_DIR }}/phpunit.xml --log-junit ${{ env.SERVICE_DIR }}/build/test-reports/junit.xml || true
        working-directory: ${{ env.SERVICE_DIR }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-junit
          path: ${{ env.SERVICE_DIR }}/build/test-reports/

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    outputs:
      version: ${{ steps.semver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calcular próxima versão semântica
        id: semver
        run: |
          LAST_TAG=$(git tag --list "payment-service/v*" --sort=-version:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else
            VERSION_CORE=${LAST_TAG#payment-service/v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_CORE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão calculada: $VERSION"

      - name: Criar e empurrar tag Git
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "payment-service/v${{ steps.semver.outputs.version }}"
          git push origin "payment-service/v${{ steps.semver.outputs.version }}"

      - name: Build JAR (placeholder)
        run: echo "No JVM build required for PHP project; building Docker image next"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Definir tags da imagem por ambiente
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "value=${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }},${{ env.IMAGE_NAME }}:latest-homol" >> "$GITHUB_OUTPUT"
            echo "primary=${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ env.IMAGE_NAME }}:latest-dev" >> "$GITHUB_OUTPUT"
            echo "primary=latest-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            IMAGE_TAG=${{ steps.tags.outputs.primary }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ steps.semver.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-dev:
    name: Deploy → DEV (Render)
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/develop'

    steps:
      - name: Acionar deploy no Render (DEV)
        env:
          HOOK_URL: ${{ secrets.DEV_RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "DEV_RENDER_DEPLOY_HOOK_URL não configurado no repositório — deploy ignorado."
            exit 0
          fi
          curl -f -X POST "$HOOK_URL"

      - name: Aguardar e verificar health
        env:
          SERVICE_URL: ${{ secrets.DEV_RENDER_SERVICE_URL }}
        run: |
          if [ -z "$SERVICE_URL" ]; then
            echo "DEV_RENDER_SERVICE_URL não configurado — health check ignorado."
            exit 0
          fi
          echo "Aguardando deploy no Render"
          sleep 30
          curl --retry 10 --retry-delay 15 --fail \
            "$SERVICE_URL/"

  deploy-homol:
    name: Deploy → HOMOL (Render)
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Acionar deploy no Render (HOMOL)
        env:
          HOOK_URL: ${{ secrets.HOMOL_RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "HOMOL_RENDER_DEPLOY_HOOK_URL não configurado — deploy ignorado."
            exit 0
          fi
          curl -f -X POST "$HOOK_URL"

      - name: Aguardar e verificar health
        env:
          SERVICE_URL: ${{ secrets.HOMOL_RENDER_SERVICE_URL }}
        run: |
          if [ -z "$SERVICE_URL" ]; then
            echo "HOMOL_RENDER_SERVICE_URL não configurado — health check ignorado."
            exit 0
          fi
          echo "Aguardando deploy no Render"
          sleep 30
          curl --retry 10 --retry-delay 15 --fail \
            "$SERVICE_URL/"

