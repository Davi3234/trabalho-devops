name: Payment Service — CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "payment-service/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "payment-service/**"
  workflow_dispatch:

env:
  SERVICE_DIR: payment-service
  IMAGE_NAME: ${{ secrets.PAYMENT_DOCKER_HUB_USERNAME }}/payment-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # 1. Build & Test
  # ─────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: payment_test
          POSTGRES_USER: payment
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payment -d payment_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql, zip, pcntl, bcmath, sockets, apcu
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências
        working-directory: ${{ env.SERVICE_DIR }}
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Criar .env
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          APP_KEY="base64:$(openssl rand -base64 32)"
          cat > .env << EOF
          APP_NAME=Lumen
          APP_ENV=testing
          APP_KEY=${APP_KEY}
          APP_DEBUG=true

          DB_CONNECTION=pgsql
          DB_HOST=127.0.0.1
          DB_PORT=5432
          DB_DATABASE=payment_test
          DB_USERNAME=payment
          DB_PASSWORD=secret

          CACHE_DRIVER=array
          QUEUE_CONNECTION=sync

          PROMETHEUS_STORAGE=apcu
          EOF

      - name: Definir APP_KEY de teste
        working-directory: ${{ env.SERVICE_DIR }}
        run: |
          APP_KEY="base64:$(openssl rand -base64 32)"
          sed -i "s|APP_KEY=.*|APP_KEY=${APP_KEY}|" .env

      - name: Executar migrations
        working-directory: ${{ env.SERVICE_DIR }}
        run: php artisan migrate --force
        env:
          APP_ENV: testing

      - name: Executar testes com cobertura
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          XDEBUG_MODE: coverage
        run: |
          ./vendor/bin/phpunit \
            --coverage-clover=coverage.xml \
            --log-junit=junit.xml

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            ${{ env.SERVICE_DIR }}/junit.xml
            ${{ env.SERVICE_DIR }}/coverage.xml

  # ─────────────────────────────────────────
  # 2. SonarCloud
  # ─────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_pgsql, zip, pcntl, bcmath, sockets, apcu
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências
        working-directory: ${{ env.SERVICE_DIR }}
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: ${{ env.SERVICE_DIR }}

      - name: Analisar com SonarCloud
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.PAYMENT_SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ env.SERVICE_DIR }}
          args: >
            -Dsonar.organization=${{ secrets.PAYMENT_SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ secrets.PAYMENT_SONAR_PROJECT_KEY }}
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.php.tests.reportPath=junit.xml

  # ─────────────────────────────────────────
  # 3. Docker Build & Push
  # ─────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: write

    outputs:
      version: ${{ steps.semver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calcular próxima versão semântica
        id: semver
        run: |
          LAST_TAG=$(git tag --list "payment-service/v*" --sort=-version:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else
            VERSION_CORE=${LAST_TAG#payment-service/v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_CORE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão calculada: $VERSION"

      - name: Criar e empurrar tag Git
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "payment-service/v${{ steps.semver.outputs.version }}"
          git push origin "payment-service/v${{ steps.semver.outputs.version }}"

      - name: Login no Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.PAYMENT_DOCKER_HUB_USERNAME }}
          password: ${{ secrets.PAYMENT_DOCKER_HUB_TOKEN }}

      - name: Definir tags da imagem por ambiente
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "value=${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }},${{ env.IMAGE_NAME }}:latest-homol" >> "$GITHUB_OUTPUT"
            echo "primary=${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ env.IMAGE_NAME }}:latest-dev" >> "$GITHUB_OUTPUT"
            echo "primary=latest-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            IMAGE_TAG=${{ steps.tags.outputs.primary }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ steps.semver.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  # ─────────────────────────────────────────
  # 4. Deploy → DEV (develop branch)
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy → DEV (Render)
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/develop'

    steps:
      - name: Acionar deploy no Render (DEV)
        env:
          HOOK_URL: ${{ secrets.PAYMENT_DEV_RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "PAYMENT_DEV_RENDER_DEPLOY_HOOK_URL não configurado — deploy ignorado."
            exit 0
          fi
          curl -f -X POST "$HOOK_URL"

      - name: Aguardar e verificar health
        env:
          SERVICE_URL: ${{ secrets.PAYMENT_DEV_RENDER_SERVICE_URL }}
        run: |
          if [ -z "$SERVICE_URL" ]; then
            echo "PAYMENT_DEV_RENDER_SERVICE_URL não configurado — health check ignorado."
            exit 0
          fi
          echo "Aguardando deploy no Render..."
          sleep 30
          curl --retry 10 --retry-delay 15 --fail "$SERVICE_URL/health"

  # ─────────────────────────────────────────
  # 5. Deploy → HOMOL (main branch)
  # ─────────────────────────────────────────
  deploy-homol:
    name: Deploy → HOMOL (Render)
    runs-on: ubuntu-latest
    needs: [build-and-test, docker, sonar]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Acionar deploy no Render (HOMOL)
        env:
          HOOK_URL: ${{ secrets.PAYMENT_HOMOL_RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "PAYMENT_HOMOL_RENDER_DEPLOY_HOOK_URL não configurado — deploy ignorado."
            exit 0
          fi
          curl -f -X POST "$HOOK_URL"

      - name: Aguardar e verificar health
        env:
          SERVICE_URL: ${{ secrets.PAYMENT_HOMOL_RENDER_SERVICE_URL }}
        run: |
          if [ -z "$SERVICE_URL" ]; then
            echo "PAYMENT_HOMOL_RENDER_SERVICE_URL não configurado — health check ignorado."
            exit 0
          fi
          echo "Aguardando deploy no Render..."
          sleep 30
          curl --retry 10 --retry-delay 15 --fail "$SERVICE_URL/health"