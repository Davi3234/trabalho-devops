name: Order Service - CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "order-service/**"
      - "k8s/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "order-service/**"
      - "k8s/**"
  workflow_dispatch:

env:
  SERVICE_DIR: order-service
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/order-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build sem testes
        run: mvn -B package -DskipTests -f ${{ env.SERVICE_DIR }}/pom.xml

      - name: Executar testes
        run: mvn -B test -f ${{ env.SERVICE_DIR }}/pom.xml

      - name: Publicar relatorio de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ env.SERVICE_DIR }}/target/surefire-reports/

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Analisar com SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B verify sonar:sonar \
            -f ${{ env.SERVICE_DIR }}/pom.xml \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    outputs:
      version: ${{ steps.semver.outputs.version }}
      tag: ${{ steps.tags.outputs.primary }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calcular proxima versao semantica
        id: semver
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            LAST_TAG=$(git tag --list "order-service/v*" --sort=-version:refname | grep -v '\-dev$' | head -n 1)
          else
            LAST_TAG=$(git tag --list "order-service/v*" --sort=-version:refname | head -n 1)
          fi

          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else
            VERSION_CORE=${LAST_TAG#order-service/v}
            VERSION_CORE=${VERSION_CORE%-dev}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_CORE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versao calculada: $VERSION"

      - name: Criar e enviar tag Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            git tag "order-service/v${{ steps.semver.outputs.version }}"
            git push origin "order-service/v${{ steps.semver.outputs.version }}"
          else
            git tag "order-service/v${{ steps.semver.outputs.version }}-dev"
            git push origin "order-service/v${{ steps.semver.outputs.version }}-dev"
          fi

      - name: Setup Java 17 para build do JAR final
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests -f ${{ env.SERVICE_DIR }}/pom.xml

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Definir tags da imagem por ambiente
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "value=${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }},${{ env.IMAGE_NAME }}:latest-homol" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }},${{ env.IMAGE_NAME }}:latest-dev" >> "$GITHUB_OUTPUT"
          fi
          echo "primary=${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            IMAGE_TAG=${{ steps.tags.outputs.primary }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ steps.semver.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-dev:
    name: Deploy -> Dev (Kubernetes)
    runs-on: [self-hosted, kubernetes, order-service]
    needs: [build-and-test, docker]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy no cluster Kubernetes
        shell: powershell
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          NAMESPACE: ${{ vars.DEV_K8S_NAMESPACE || 'order-service' }}
          IMAGE_TAG: ${{ needs.docker.outputs.tag }}
          KUSTOMIZE_PATH: k8s/services/order-service/dev
          DEPLOYMENT_NAME: order-service-dev
          SECRET_NAME: order-service-dev-secret
          DEV_ORDER_DB_USERNAME: ${{ secrets.DEV_ORDER_DB_USERNAME }}
          DEV_ORDER_DB_PASSWORD: ${{ secrets.DEV_ORDER_DB_PASSWORD }}
          DEV_ORDER_POSTGRES_DB: ${{ secrets.DEV_ORDER_POSTGRES_DB }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DEV_ORDER_DB_USERNAME)) { throw "Secret DEV_ORDER_DB_USERNAME nao configurado" }
          if ([string]::IsNullOrWhiteSpace($env:DEV_ORDER_DB_PASSWORD)) { throw "Secret DEV_ORDER_DB_PASSWORD nao configurado" }
          if ([string]::IsNullOrWhiteSpace($env:DEV_ORDER_POSTGRES_DB)) { throw "Secret DEV_ORDER_POSTGRES_DB nao configurado" }
          if ([string]::IsNullOrWhiteSpace($env:IMAGE_TAG)) { throw "IMAGE_TAG vazio - output do job docker nao propagado" }

          kubectl create namespace $env:NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          $secretArgs = @(
            "-n", $env:NAMESPACE,
            "create", "secret", "generic", $env:SECRET_NAME,
            "--from-literal=DB_USERNAME=$env:DEV_ORDER_DB_USERNAME",
            "--from-literal=DB_PASSWORD=$env:DEV_ORDER_DB_PASSWORD",
            "--from-literal=POSTGRES_DB=$env:DEV_ORDER_POSTGRES_DB",
            "--from-literal=POSTGRES_USER=$env:DEV_ORDER_DB_USERNAME",
            "--from-literal=POSTGRES_PASSWORD=$env:DEV_ORDER_DB_PASSWORD",
            "--dry-run=client", "-o", "yaml"
          )
          kubectl @secretArgs | kubectl apply -f -

          kubectl -n $env:NAMESPACE apply -k $env:KUSTOMIZE_PATH
          kubectl -n $env:NAMESPACE set image "deployment/$env:DEPLOYMENT_NAME" "order-service=$($env:IMAGE_NAME):$($env:IMAGE_TAG)"
          kubectl -n $env:NAMESPACE rollout status "deployment/$env:DEPLOYMENT_NAME" --timeout=120s

  deploy-homol:
    name: Deploy -> Homol (Kubernetes)
    runs-on: [self-hosted, kubernetes, order-service]
    needs: [build-and-test, docker, sonar]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy no cluster Kubernetes
        shell: powershell
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          NAMESPACE: ${{ vars.HML_K8S_NAMESPACE || 'order-service' }}
          IMAGE_TAG: ${{ needs.docker.outputs.tag }}
          KUSTOMIZE_PATH: k8s/services/order-service/homol
          DEPLOYMENT_NAME: order-service-homol
          SECRET_NAME: order-service-homol-secret
          HML_ORDER_DB_USERNAME: ${{ secrets.HML_ORDER_DB_USERNAME }}
          HML_ORDER_DB_PASSWORD: ${{ secrets.HML_ORDER_DB_PASSWORD }}
          HML_ORDER_POSTGRES_DB: ${{ secrets.HML_ORDER_POSTGRES_DB }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:HML_ORDER_DB_USERNAME)) { throw "Secret HML_ORDER_DB_USERNAME nao configurado" }
          if ([string]::IsNullOrWhiteSpace($env:HML_ORDER_DB_PASSWORD)) { throw "Secret HML_ORDER_DB_PASSWORD nao configurado" }
          if ([string]::IsNullOrWhiteSpace($env:HML_ORDER_POSTGRES_DB)) { throw "Secret HML_ORDER_POSTGRES_DB nao configurado" }
          if ([string]::IsNullOrWhiteSpace($env:IMAGE_TAG)) { throw "IMAGE_TAG vazio - output do job docker nao propagado" }

          kubectl create namespace $env:NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          $secretArgs = @(
            "-n", $env:NAMESPACE,
            "create", "secret", "generic", $env:SECRET_NAME,
            "--from-literal=DB_USERNAME=$env:HML_ORDER_DB_USERNAME",
            "--from-literal=DB_PASSWORD=$env:HML_ORDER_DB_PASSWORD",
            "--from-literal=POSTGRES_DB=$env:HML_ORDER_POSTGRES_DB",
            "--from-literal=POSTGRES_USER=$env:HML_ORDER_DB_USERNAME",
            "--from-literal=POSTGRES_PASSWORD=$env:HML_ORDER_DB_PASSWORD",
            "--dry-run=client", "-o", "yaml"
          )
          kubectl @secretArgs | kubectl apply -f -

          kubectl -n $env:NAMESPACE apply -k $env:KUSTOMIZE_PATH
          kubectl -n $env:NAMESPACE set image "deployment/$env:DEPLOYMENT_NAME" "order-service=$($env:IMAGE_NAME):$($env:IMAGE_TAG)"
          kubectl -n $env:NAMESPACE rollout status "deployment/$env:DEPLOYMENT_NAME" --timeout=120s
