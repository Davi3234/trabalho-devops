name: Order Service — CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "order-service/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "order-service/**"
  workflow_dispatch:

env:
  SERVICE_DIR: order-service
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/order-service
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build (sem testes)
        run: mvn -B package -DskipTests -f ${{ env.SERVICE_DIR }}/pom.xml

      - name: Executar testes
        run: mvn -B test -f ${{ env.SERVICE_DIR }}/pom.xml

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ${{ env.SERVICE_DIR }}/target/surefire-reports/

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Analisar com SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        run: |
          mvn -B verify sonar:sonar \
            -f ${{ env.SERVICE_DIR }}/pom.xml \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    outputs:
      version: ${{ steps.semver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calcular próxima versão semântica
        id: semver
        run: |
          LAST_TAG=$(git tag --list "order-service/v*" --sort=-version:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else
            VERSION_CORE=${LAST_TAG#order-service/v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_CORE"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Versão calculada: $VERSION"

      - name: Criar e empurrar tag Git
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "order-service/v${{ steps.semver.outputs.version }}"
          git push origin "order-service/v${{ steps.semver.outputs.version }}"

      - name: Setup Java 17 (para build do JAR final)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn -B package -DskipTests -f ${{ env.SERVICE_DIR }}/pom.xml

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Definir tags da imagem por ambiente
        id: tags
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "value=${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }},${{ env.IMAGE_NAME }}:latest-homol" >> "$GITHUB_OUTPUT"
            echo "primary=${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }},${{ env.IMAGE_NAME }}:latest-dev" >> "$GITHUB_OUTPUT"
            echo "primary=${{ steps.semver.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.SERVICE_DIR }}
          push: true
          tags: ${{ steps.tags.outputs.value }}
          build-args: |
            IMAGE_TAG=${{ steps.tags.outputs.primary }}
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
          labels: |
            org.opencontainers.image.version=${{ steps.semver.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy-dev:
    name: Deploy → DEV (Render)
    runs-on: ubuntu-latest
    needs: [build-and-test, docker]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/develop'

    steps:
      - name: Acionar deploy no Render (DEV)
        env:
          HOOK_URL: ${{ secrets.DEV_RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "DEV_RENDER_DEPLOY_HOOK_URL não configurado no repositório — deploy ignorado."
            echo "Configure em: GitHub → Settings → Secrets and variables → Actions"
            exit 0
          fi
          curl -f -X POST "$HOOK_URL"

      - name: Aguardar e verificar health
        env:
          SERVICE_URL: ${{ secrets.DEV_RENDER_SERVICE_URL }}
        run: |
          if [ -z "$SERVICE_URL" ]; then
            echo "DEV_RENDER_SERVICE_URL não configurado — health check ignorado."
            exit 0
          fi
          echo "Aguardando deploy no Render"
          sleep 30
          curl --retry 10 --retry-delay 15 --fail \
            "$SERVICE_URL/actuator/health"

  deploy-homol:
    name: Deploy → HOMOL (Render)
    runs-on: ubuntu-latest
    needs: [build-and-test, docker, sonar]
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Acionar deploy no Render
        run: |
          curl -f -X POST "${{ secrets.HOMOL_RENDER_DEPLOY_HOOK_URL }}"

      - name: Aguardar e verificar health
        env:
          SERVICE_URL: ${{ secrets.HOMOL_RENDER_SERVICE_URL }}
        run: |
          if [ -z "$SERVICE_URL" ]; then
            echo "HOMOL_RENDER_SERVICE_URL não configurado — health check ignorado."
            echo "Configure em: GitHub → Settings → Secrets and variables → Actions"
            exit 0
          fi
          echo "Aguardando deploy no Render"
          sleep 30
          curl --retry 10 --retry-delay 15 --fail \
            "$SERVICE_URL/actuator/health"
