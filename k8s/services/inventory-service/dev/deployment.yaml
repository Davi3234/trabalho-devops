apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-dev
  labels:
    app: inventory-service-dev
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service-dev
  template:
    metadata:
      labels:
        app: inventory-service-dev
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: inventory-service
          image: inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: inventory-service-dev-config
            - secretRef:
                name: inventory-service-dev-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
