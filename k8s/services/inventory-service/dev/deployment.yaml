apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-dev
  labels:
    app: inventory-service-dev
    environment: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service-dev
  template:
    metadata:
      labels:
        app: inventory-service-dev
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3000"
    spec:
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Aguardando postgres..."
              until nc -z inventory-postgres-dev 5432; do sleep 2; done
              echo "Aguardando redis..."
              until nc -z inventory-redis-dev 6379; do sleep 2; done
              echo "Aguardando rabbitmq..."
              until nc -z rabbitmq 5672; do sleep 2; done
              echo "Dependencias prontas."
      containers:
        - name: inventory-service
          image: inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: inventory-service-dev-config
            - secretRef:
                name: inventory-service-dev-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
