apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-service-homol
  labels:
    app: payment-service-homol
    environment: homol
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - host: homol.devops.local
      http:
        paths:
          - path: /api/payments(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: payment-service-homol
                port:
                  number: 8080
