apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-homol
  labels:
    app: payment-service-homol
    environment: homol
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service-homol
  template:
    metadata:
      labels:
        app: payment-service-homol
        environment: homol
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: payment-service-homol-config
            - secretRef:
                name: payment-service-homol-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
