apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - secret.yaml

configMapGenerator:
  - name: grafana-dashboards
    files:
      - dashboards/order-service.json
      - dashboards/inventory-service.json
      - dashboards/payment-service.json

generatorOptions:
  disableNameSuffixHash: true
