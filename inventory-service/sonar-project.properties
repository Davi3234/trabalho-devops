# sonar.projectKey e sonar.organization são injetados pelo workflow via secrets
# para não expor valores sensíveis no repositório.

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/prisma/migrations/**,\
  **/infrastructure/generate/**

sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/main.ts,\
  **/prisma/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
sonar.sourceEncoding=UTF-8
